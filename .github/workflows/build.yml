name: Build
on:
  push:
    branches: [ master-draft ]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            os: win32
            arch: x64
            make: nmake
          - runner: macos-15
            os: darwin
            arch: arm64
            make: make
          - runner: macos-15
            os: darwin
            arch: x64 # This is a lie, but for cross-compilation
            make: make
          - runner: ubuntu-24.04
            os: linux
            arch: x64
            make: make
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64 
            make: make

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Setup Windows
        if: matrix.os == 'win32'
        uses: ilammy/msvc-dev-cmd@v1
      - name: Setup NASM for Windows
        if: matrix.os == 'win32'
        uses: ilammy/setup-nasm@v1.2.1
      
      - name: Export submodules.txt as a state for cached dependencies
        run: |
          git clone --depth=1 --branch ${{ github.ref_name }} https://github.com/${{ github.repository }}.git .
          git submodule status > submodules.txt

      - name: Restore submodule build cache
        id: submodules
        uses: actions/cache@v5
        with:
          path: |
            uWebSockets
            targets
          # checks for submodule updates, compiler changes, updated NodeJS targets 
          key: sub-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('submodules.txt', 'build.h', 'build.c') }}

      - name: Prepare submodules
        if: steps.submodules.outputs.cache-hit != 'true'
        shell: bash
        run: |

          # only latest states
          git submodule update --init --recursive --depth 1

          ${{ 
            (matrix.runner != 'macos-15' || matrix.arch != 'x64') 
            && format('{0} prepare', matrix.make) 
            || 'make prepare-macos-x64' 
          }}
          ${{ matrix.make }} build-deps

      - name: Compile binaries 
        run: |
          ${{ matrix.make }} build-proj
          ls dist

      - name: Save results
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*${{ matrix.arch }}*.node

      - name: Compile ASAN binaries
        if: matrix.os != 'win32'
        run: |

          rm dist/*.node
          make prebuilt-asan
          ls dist

      - name: Save ASAN Binaries
        if: matrix.os != 'win32'
        uses: actions/upload-artifact@v7
        with:
          name: binaries-asan-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*${{ matrix.arch }}*.node

  test: 
    needs: build
    strategy:
      fail-fast: false
      matrix:
        runner: [windows-latest, macos-15, ubuntu-24.04, ubuntu-24.04-arm]
        node: [22, 24, 26]
        include:
          - runner: windows-latest
            os: win32
            arch: x64
          # macos-15 is arm64, but for x64 "rosetta" can be used as an emulator
          - runner: macos-15
            os: darwin
            arch: arm64
          - runner: ubuntu-24.04
            os: linux
            arch: x64
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64 


    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: clone repo
        run: |
          git clone --depth=1 --branch ${{ github.ref_name }} https://github.com/${{ github.repository }}.git .
      - name: install binaries
        uses: actions/download-artifact@v8
        with: 
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: dist
      - run: npm install ws && cd tests && node smoke.js
  save:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: test 
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Prepare artifacts before pushing to branch
        run: |
          mkdir binaries
          mv artifacts/binaries-win32-x64/* binaries 
          mv artifacts/binaries-linux-x64/* binaries 
          mv artifacts/binaries-darwin-x64/* binaries 
          mv artifacts/binaries-linux-arm64/* binaries 
          mv artifacts/binaries-darwin-arm64/* binaries 

          mkdir binaries-asan
          mv artifacts/binaries-asan-linux-x64/* binaries-asan
          mv artifacts/binaries-asan-darwin-x64/* binaries-asan
          mv artifacts/binaries-asan-linux-arm64/* binaries-asan
          mv artifacts/binaries-asan-darwin-arm64/* binaries-asan
          
          rm -rf artifacts

      - name: Configure actions
        run: |

          git clone --depth=1 --branch ${{ github.ref_name }} https://github.com/${{ github.repository }}.git ./repo
          mkdir changes
          cd repo

          git config --global user.email "github-actions@github.com"
          git config --global user.name "Github Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          git rev-parse HEAD > ../changes/source_commit
          cp dist/* ../changes

      - name: Commit binaries
        run: |

          cd repo
          git fetch --depth=1 origin binaries:binaries
          git switch binaries
          cp ../binaries/* ../changes/source_commit .
          echo '<-- [What files are in this directory?] -->'
          ls .
          git status
          
          # compress each file separately
          for file in *.node; do
            if [ -f "$file" ]; then
            tar -czf "$file.tar.gz" "$file"
            fi
          done

          git add *.gz source_commit
          git commit -m "Updated all binaries" || true
          git push origin binaries || true
      - name: Commit AddressSanitizer binaries
        run: |

          cd repo
          git fetch --depth=1 origin binaries-asan:binaries-asan
          git switch binaries-asan
          cp ../binaries-asan/* ../changes/source_commit .
          rm *win32* || true
          echo '<-- [What files are in this directory?] -->'
          ls .
          git status
          # compress each file separately
          for file in *.node; do
            if [ -f "$file" ]; then
            tar -czf "$file.tar.gz" "$file"
            fi
          done

          git add *.gz source_commit
          git commit -m "Updated all binaries" || true
          git push origin binaries-asan || true

      - name: Update installer
        run: |

          cd repo
          rm *.node
          git fetch --depth=1 origin dist:dist
          git switch dist 
          mv ../changes/* .
          git status

          git add .
          git commit -m "Updated commit version" || true
          git push origin dist 
