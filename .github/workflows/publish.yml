name: Publish 
on:
  release:
    types: 
      - published
jobs:
  publish:
    if: github.event.release.target_commitish == 'public'
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - name: Fetch binaries
        run: |
          git clone --depth=1 --branch binaries https://github.com/${{ github.repository }}.git .
      - uses: softprops/action-gh-release@v3
        with:
          files: ./*.gz
